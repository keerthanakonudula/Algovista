<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlgoVista — Algorithm Visualizer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

#landing{
  text-align:center;
  padding:40px;
}

button{
  padding:10px 20px;
  border:none;
  background:#22d3ee;
  cursor:pointer;
  border-radius:6px;
}

#app{
  display:none;
  padding:20px;
}

#array{
  display:flex;
  align-items:flex-end;
  height:300px;
  gap:5px;
}

.bar{
  width:20px;
  background:#22d3ee;
}

.controls{
  margin-top:20px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <h1>AlgoVista</h1>
  <p>Algorithm Visualizer</p>
  <button onclick="start()">Start</button>
</div>

<!-- APP -->
<div id="app">
  <h2>Bubble Sort Visualizer</h2>

  <div id="array"></div>

  <div class="controls">
    <button onclick="generate()">Generate</button>
    <button onclick="bubbleSort()">Sort</button>
  </div>
</div>

<script>
let arr = [];
let delay = 100;

function start(){
  document.getElementById("landing").style.display="none";
  document.getElementById("app").style.display="block";
  generate();
}

function generate(){
  arr=[];
  for(let i=0;i<20;i++){
    arr.push(Math.floor(Math.random()*100)+10);
  }
  draw();
}

function draw(){
  const container=document.getElementById("array");
  container.innerHTML="";

  arr.forEach(value=>{
    const bar=document.createElement("div");
    bar.classList.add("bar");
    bar.style.height=value*2+"px";
    container.appendChild(bar);
  });
}

function sleep(ms){
  return new Promise(r=>setTimeout(r,ms));
}

async function bubbleSort(){
  let bars=document.getElementsByClassName("bar");

  for(let i=0;i<arr.length;i++){
    for(let j=0;j<arr.length-i-1;j++){

      bars[j].style.background="red";
      bars[j+1].style.background="red";

      await sleep(delay);

      if(arr[j]>arr[j+1]){
        let temp=arr[j];
        arr[j]=arr[j+1];
        arr[j+1]=temp;
        draw();
        bars=document.getElementsByClassName("bar");
      }

      bars[j].style.background="#22d3ee";
      bars[j+1].style.background="#22d3ee";
    }

    bars[arr.length-i-1].style.background="green";
  }
}
</script>

</body>
</html>
