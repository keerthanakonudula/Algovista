<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVista Master | Pointer Debugger & Visualizer</title>
    <style>
        :root {
            --bg: #030712;
            --sidebar: #111827;
            --primary: #22d3ee;
            --accent: #8b5cf6;
            --text: #f3f4f6;
            --glass: rgba(255, 255, 255, 0.05);
            /* Action Colors */
            --default: linear-gradient(180deg, #22d3ee 0%, #8b5cf6 100%);
            --compare: #facc15; /* Yellow */
            --swap: #ef4444;    /* Red */
            --sorted: #22c55e;  /* Green */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* Start Page */
        #start-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
            z-index: 1000; transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .hero h1 { font-size: 5rem; font-weight: 900; letter-spacing: -2px; }
        .hero h1 span { color: var(--primary); text-shadow: 0 0 30px rgba(34, 211, 238, 0.3); }
        .slide-up { transform: translateY(-100%); }

        /* Layout */
        #app-container { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .sidebar { background: var(--sidebar); padding: 30px; border-right: 1px solid #1f2937; overflow-y: auto; }
        .sidebar h2 { color: var(--primary); margin-bottom: 20px; }

        .control-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 8px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-run { background: var(--primary); color: #000; }
        .btn-gen { background: #374151; color: white; }

        /* Color Legend Side Note */
        .legend { background: var(--glass); padding: 15px; border-radius: 12px; border: 1px solid #374151; margin-top: 10px; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.75rem; color: #9ca3af; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }

        /* Visualizer Stage */
        .main-stage { padding: 40px; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .visualizer-container { width: 100%; background: var(--glass); padding: 50px 30px 30px 30px; border-radius: 16px; border: 1px solid #1f2937; position: relative; }
        
        #array-box { display: flex; align-items: flex-end; gap: 10px; height: 300px; width: 100%; justify-content: center; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 55px; position: relative; }
        .bar { width: 100%; background: var(--default); border-radius: 6px 6px 0 0; transition: height 0.3s ease, background 0.3s; }
        
        /* Floating Pointer Labels (i, j) */
        .pointer { position: absolute; top: -35px; font-weight: 900; font-size: 16px; color: var(--compare); opacity: 0; transition: 0.2s; }
        .pointer.active { opacity: 1; transform: translateY(-5px); }
        .index-tag { font-size: 11px; color: #64748b; margin-top: 10px; font-weight: bold; }

        /* Controls */
        .step-controls { display: flex; gap: 15px; margin-top: 40px; }
        .btn-step { padding: 12px 25px; background: #1e293b; color: white; border: 1px solid var(--primary); border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-step:hover { background: var(--primary); color: #000; }

        /* Complexity Table */
        .analysis { width: 100%; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; background: var(--glass); border-radius: 8px; overflow: hidden; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #1f2937; font-size: 0.85rem; }
        th { color: var(--primary); }
    </style>
</head>
<body>

    <div id="start-page">
        <div class="hero">
            <h1>Algo<span>Vista</span></h1>
            <p>Advanced Step-by-Step Algorithm Debugger</p>
            <center><button class="btn btn-run" style="width: auto; padding: 18px 60px;" onclick="launch()">Launch Platform</button></center>
        </div>
    </div>

    <div id="app-container">
        <aside class="sidebar">
            <h2>AlgoVista</h2>
            
            <div class="legend">
                <label>Visual Side-Note</label>
                <div class="legend-item"><div class="dot" style="background: var(--compare)"></div> Comparing (i, j Labels)</div>
                <div class="legend-item"><div class="dot" style="background: var(--swap)"></div> Swapping Elements</div>
                <div class="legend-item"><div class="dot" style="background: var(--sorted)"></div> Sorted Position</div>
            </div>
            <br>

            <div class="control-group">
                <label>Custom Array</label>
                <textarea id="custom-input" placeholder="e.g. 40, 10, 80, 35"></textarea>
                <button class="btn btn-gen" onclick="applyCustom()">Apply Array</button>
            </div>

            <div class="control-group">
                <label>Algorithm</label>
                <select id="algo-select" onchange="resetEngine()">
                    <option value="bubble">Bubble Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="quick">Quick Sort</option>
                    <option value="merge">Merge Sort</option>
                </select>
            </div>

            <div class="control-group">
                <label>Playback Speed</label>
                <input type="range" id="speed" min="1" max="100" value="80">
            </div>

            <button class="btn btn-run" onclick="autoPlay()">Auto-Play Sort</button>
            <button class="btn btn-gen" onclick="resetEverything()">Randomize Array</button>
        </aside>

        <main class="main-stage">
            <div class="visualizer-container">
                <div id="array-box"></div>
                <div class="step-controls">
                    <button class="btn-step" onclick="stepPrev()">← Previous</button>
                    <button class="btn-step" id="pause-btn" onclick="togglePause()">Play / Pause</button>
                    <button class="btn-step" onclick="stepNext()">Next Step →</button>
                </div>
            </div>

            <div class="analysis">
                <table>
                    <thead><tr><th>Complexity</th><th>Value</th></tr></thead>
                    <tbody id="metrics">
                        <tr><td>Worst Case Time</td><td id="t-worst" style="color: var(--primary)">-</td></tr>
                        <tr><td>Average Case Time</td><td id="t-avg" style="color: var(--primary)">-</td></tr>
                        <tr><td>Space Complexity</td><td id="s-space" style="color: var(--accent)">-</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let array = [];
        let states = []; // For Undo
        let it; // Generator instance
        let isAutoPlaying = false;

        const dataStore = {
            bubble: { worst: "O(n²)", avg: "O(n²)", space: "O(1)" },
            selection: { worst: "O(n²)", avg: "O(n²)", space: "O(1)" },
            insertion: { worst: "O(n²)", avg: "O(n²)", space: "O(1)" },
            quick: { worst: "O(n²)", avg: "O(n log n)", space: "O(log n)" },
            merge: { worst: "O(n log n)", avg: "O(n log n)", space: "O(n)" }
        };

        function launch() {
            document.getElementById('start-page').classList.add('slide-up');
            resetEverything();
        }

        function render(currentArray, highlights = {}) {
            const box = document.getElementById('array-box');
            box.innerHTML = '';
            currentArray.forEach((item, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';

                // Pointer Label (i, j)
                const ptr = document.createElement('div');
                ptr.className = 'pointer';
                if (highlights.compare?.includes(i)) {
                    ptr.innerText = (highlights.compare[0] === i) ? 'i' : 'j';
                    ptr.classList.add('active');
                }

                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${item.val * 3}px`;
                
                // State Coloring
                if (highlights.compare?.includes(i)) bar.style.background = 'var(--compare)';
                else if (highlights.swap?.includes(i)) bar.style.background = 'var(--swap)';
                else if (item.sorted) bar.style.background = 'var(--sorted)';

                const tag = document.createElement('div');
                tag.className = 'index-tag';
                tag.innerText = i;

                wrapper.appendChild(ptr);
                wrapper.appendChild(bar);
                wrapper.appendChild(tag);
                box.appendChild(wrapper);
            });
        }

        function resetEverything() {
            const raw = Array.from({length: 10}, () => Math.floor(Math.random() * 70) + 15);
            array = raw.map(v => ({val: v, sorted: false}));
            resetEngine();
        }

        function applyCustom() {
            const str = document.getElementById('custom-input').value;
            if(!str) return;
            const raw = str.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            array = raw.map(v => ({val: v, sorted: false}));
            resetEngine();
        }

        function resetEngine() {
            const type = document.getElementById('algo-select').value;
            document.getElementById('t-worst').innerText = dataStore[type].worst;
            document.getElementById('t-avg').innerText = dataStore[type].avg;
            document.getElementById('s-space').innerText = dataStore[type].space;

            if(type === 'bubble') it = bubbleGen();
            if(type === 'selection') it = selectionGen();
            if(type === 'insertion') it = insertionGen();
            if(type === 'quick') it = quickGen();
            if(type === 'merge') it = mergeGen();

            states = [];
            isAutoPlaying = false;
            render(array);
        }

        /* --- GENERATORS --- */

        function* bubbleGen() {
            let a = JSON.parse(JSON.stringify(array));
            for (let i = 0; i < a.length; i++) {
                for (let j = 0; j < a.length - i - 1; j++) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [j, j+1]} };
                    if (a[j].val > a[j+1].val) {
                        [a[j], a[j+1]] = [a[j+1], a[j]];
                        yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [j, j+1]} };
                    }
                }
                a[a.length - 1 - i].sorted = true;
            }
            yield { arr: a, hl: {} };
        }

        function* selectionGen() {
            let a = JSON.parse(JSON.stringify(array));
            for (let i = 0; i < a.length; i++) {
                let min = i;
                for (let j = i + 1; j < a.length; j++) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [min, j]} };
                    if (a[j].val < a[min].val) min = j;
                }
                [a[i], a[min]] = [a[min], a[i]];
                yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [i, min]} };
                a[i].sorted = true;
            }
            yield { arr: a, hl: {} };
        }

        function* insertionGen() {
            let a = JSON.parse(JSON.stringify(array));
            for (let i = 1; i < a.length; i++) {
                let key = JSON.parse(JSON.stringify(a[i]));
                let j = i - 1;
                while (j >= 0 && a[j].val > key.val) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [j, i]} };
                    a[j + 1] = JSON.parse(JSON.stringify(a[j]));
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [j, j+1]} };
                    j--;
                }
                a[j + 1] = key;
                a.slice(0, i+1).forEach(x => x.sorted = true);
                yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [j+1]} };
            }
            yield { arr: a, hl: {} };
        }

        function* quickGen() {
            let a = JSON.parse(JSON.stringify(array));
            function* sort(l, r) {
                if (l <= r) {
                    let p = yield* partition(l, r);
                    a[p].sorted = true;
                    yield* sort(l, p - 1);
                    yield* sort(p + 1, r);
                }
            }
            function* partition(l, r) {
                let pivot = a[r].val;
                let i = l - 1;
                for (let j = l; j < r; j++) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [j, r]} };
                    if (a[j].val < pivot) {
                        i++;
                        [a[i], a[j]] = [a[j], a[i]];
                        yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [i, j]} };
                    }
                }
                [a[i+1], a[r]] = [a[r], a[i+1]];
                yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [i+1, r]} };
                return i + 1;
            }
            yield* sort(0, a.length - 1);
            a.forEach(x => x.sorted = true);
            yield { arr: a, hl: {} };
        }

        function* mergeGen() {
            let a = JSON.parse(JSON.stringify(array));
            function* sort(l, r) {
                if (l < r) {
                    let m = Math.floor((l+r)/2);
                    yield* sort(l, m);
                    yield* sort(m+1, r);
                    yield* merge(l, m, r);
                }
            }
            function* merge(l, m, r) {
                let L = a.slice(l, m + 1), R = a.slice(m + 1, r + 1);
                let i = 0, j = 0, k = l;
                while (i < L.length && j < R.length) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [l+i, m+1+j]} };
                    if (L[i].val <= R[j].val) a[k++] = L[i++];
                    else a[k++] = R[j++];
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [k-1]} };
                }
                while (i < L.length) { a[k++] = L[i++]; yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [k-1]} }; }
                while (j < R.length) { a[k++] = R[j++]; yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [k-1]} }; }
                if(l===0 && r===a.length-1) a.forEach(x => x.sorted = true);
            }
            yield* sort(0, a.length - 1);
            yield { arr: a, hl: {} };
        }

        /* --- UI ACTIONS --- */

        function stepNext() {
            const res = it.next();
            if (!res.done) {
                states.push(JSON.parse(JSON.stringify({arr: array})));
                array = res.value.arr;
                render(array, res.value.hl);
            } else {
                isAutoPlaying = false;
            }
        }

        function stepPrev() {
            if (states.length > 0) {
                const prev = states.pop();
                array = prev.arr;
                render(array);
            }
        }

        function togglePause() {
            isAutoPlaying = !isAutoPlaying;
            if (isAutoPlaying) loop();
        }

        async function loop() {
            while (isAutoPlaying) {
                stepNext();
                await new Promise(r => setTimeout(r, 110 - document.getElementById('speed').value));
            }
        }

        function autoPlay() {
            isAutoPlaying = true;
            loop();
        }
    </script>
</body>
</html>
