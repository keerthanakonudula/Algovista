<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVista Master | Step-by-Step Visualizer</title>
    <style>
        :root {
            --bg: #030712;
            --sidebar: #111827;
            --primary: #22d3ee;
            --accent: #8b5cf6;
            --text: #f3f4f6;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; height: 100vh; }

        /* Start Page */
        #start-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
            z-index: 1000; transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .hero h1 { font-size: 5rem; font-weight: 900; letter-spacing: -2px; }
        .hero h1 span { color: var(--primary); text-shadow: 0 0 30px rgba(34, 211, 238, 0.3); }
        .hero p { opacity: 0.6; margin-bottom: 30px; font-size: 1.2rem; text-align: center; }
        .slide-up { transform: translateY(-100%); }

        /* Layout */
        #app-container { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .sidebar { background: var(--sidebar); padding: 30px; border-right: 1px solid #1f2937; overflow-y: auto; }
        
        .control-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
        select, input, textarea { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 8px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-run { background: var(--primary); color: #000; }
        .btn-gen { background: #374151; color: white; }

        /* Visualizer Stage */
        .main-stage { padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; overflow-y: auto; }
        .visualizer-container { width: 100%; background: var(--glass); padding: 30px; border-radius: 16px; border: 1px solid #1f2937; margin-bottom: 30px; }
        
        #array-box { display: flex; align-items: flex-end; gap: 4px; height: 300px; width: 100%; justify-content: center; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 40px; }
        .bar { width: 100%; background: linear-gradient(180deg, var(--primary) 0%, var(--accent) 100%); border-radius: 4px 4px 0 0; transition: height 0.3s ease, background 0.3s; }
        .index-tag { font-size: 10px; color: #64748b; margin-top: 8px; font-weight: bold; }

        /* Step Controls */
        .step-controls { display: flex; gap: 15px; margin-top: 30px; justify-content: center; width: 100%; }
        .btn-step { padding: 12px 25px; background: #1e293b; color: white; border: 1px solid var(--primary); border-radius: 8px; cursor: pointer; font-weight: 600; min-width: 120px; transition: 0.2s; }
        .btn-step:hover { background: var(--primary); color: #000; }
        .btn-step:disabled { opacity: 0.3; cursor: not-allowed; border-color: #374151; }

        /* Bottom Info Panels */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: var(--sidebar); padding: 20px; border-radius: 12px; border: 1px solid #1f2937; }
        .card h4 { color: var(--primary); margin-bottom: 15px; text-transform: uppercase; font-size: 0.9rem; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 0; border-bottom: 1px solid #1f2937; font-size: 0.9rem; }
        .val { text-align: right; font-family: monospace; color: var(--accent); font-weight: bold; }
        
        #code-display { font-family: 'Courier New', monospace; font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="start-page">
        <div class="hero">
            <h1>Algo<span>Vista</span></h1>
            <p>The Ultimate Step-by-Step Algorithm Debugger</p>
            <center><button class="btn btn-run" style="width: auto; padding: 18px 60px;" onclick="launch()">Launch Platform</button></center>
        </div>
    </div>

    <div id="app-container">
        <aside class="sidebar">
            <h2>AlgoVista</h2>
            <br>
            <div class="control-group">
                <label>Custom Array (Commas)</label>
                <textarea id="custom-input" placeholder="e.g. 80, 20, 55, 10, 90"></textarea>
                <button class="btn btn-gen" onclick="applyCustom()">Apply Custom</button>
            </div>

            <div class="control-group">
                <label>Algorithm Selection</label>
                <select id="algo-select" onchange="resetEngine()">
                    <option value="bubble">Bubble Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="insertion">Insertion Sort</option>
                </select>
            </div>

            <div class="control-group">
                <label>Playback Speed (Auto-run)</label>
                <input type="range" id="speed" min="1" max="100" value="70">
            </div>

            <button class="btn btn-run" onclick="autoPlay()">Auto-Run</button>
            <button class="btn btn-gen" onclick="resetEverything()">Reset & Randomize</button>
        </aside>

        <main class="main-stage">
            <div class="visualizer-container">
                <div id="array-box"></div>
                
                <div class="step-controls">
                    <button class="btn-step" id="prev-btn" onclick="stepPrev()">← Previous</button>
                    <button class="btn-step" id="pause-btn" onclick="togglePause()">Play / Pause</button>
                    <button class="btn-step" id="next-btn" onclick="stepNext()">Next Step →</button>
                </div>
            </div>

            <div class="info-grid">
                <div class="card">
                    <h4>Complexity Metrics</h4>
                    <table>
                        <tr><td>Best Case</td><td class="val" id="t-best">-</td></tr>
                        <tr><td>Average Case</td><td class="val" id="t-avg">-</td></tr>
                        <tr><td>Worst Case</td><td class="val" id="t-worst">-</td></tr>
                        <tr><td>Space Complexity</td><td class="val" id="s-space">-</td></tr>
                    </table>
                </div>
                <div class="card">
                    <h4>Algorithm Snippet (JS)</h4>
                    <div id="code-display">Select an algorithm to view logic.</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let array = [];
        let history = [];
        let it; // Generator instance
        let isAutoPlaying = false;

        const dataStore = {
            bubble: {
                best: "O(n)", avg: "O(n²)", worst: "O(n²)", space: "O(1)",
                code: "for(let j=0; j<n-i-1; j++) {\n  if(a[j] > a[j+1]) \n    swap(a[j], a[j+1]);\n}"
            },
            selection: {
                best: "O(n²)", avg: "O(n²)", worst: "O(n²)", space: "O(1)",
                code: "let min = i;\nfor(let j=i+1; j<n; j++) {\n  if(a[j] < a[min]) min = j;\n}\nswap(a[i], a[min]);"
            },
            insertion: {
                best: "O(n)", avg: "O(n²)", worst: "O(n²)", space: "O(1)",
                code: "while(j >= 0 && a[j] > key) {\n  a[j+1] = a[j];\n  j--;\n}\na[j+1] = key;"
            }
        };

        function launch() {
            document.getElementById('start-page').classList.add('slide-up');
            resetEverything();
        }

        function render() {
            const box = document.getElementById('array-box');
            box.innerHTML = '';
            array.forEach((val, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';
                
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${val * 2.5}px`;
                
                const indexTag = document.createElement('div');
                indexTag.className = 'index-tag';
                indexTag.innerText = i;

                wrapper.appendChild(bar);
                wrapper.appendChild(indexTag);
                box.appendChild(wrapper);
            });
        }

        function resetEverything() {
            array = Array.from({length: 15}, () => Math.floor(Math.random() * 80) + 20);
            history = [];
            resetEngine();
            render();
        }

        function applyCustom() {
            const str = document.getElementById('custom-input').value;
            if(!str) return;
            array = str.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            history = [];
            resetEngine();
            render();
        }

        function resetEngine() {
            const type = document.getElementById('algo-select').value;
            const info = dataStore[type];
            
            document.getElementById('t-best').innerText = info.best;
            document.getElementById('t-avg').innerText = info.avg;
            document.getElementById('t-worst').innerText = info.worst;
            document.getElementById('s-space').innerText = info.space;
            document.getElementById('code-display').innerText = info.code;

            if(type === 'bubble') it = bubbleGen();
            if(type === 'selection') it = selectionGen();
            if(type === 'insertion') it = insertionGen();
            
            history = [];
            isAutoPlaying = false;
        }

        /* --- GENERATORS (The Logic Engine) --- */

        function* bubbleGen() {
            let tempArray = [...array];
            for (let i = 0; i < tempArray.length; i++) {
                for (let j = 0; j < tempArray.length - i - 1; j++) {
                    if (tempArray[j] > tempArray[j + 1]) {
                        [tempArray[j], tempArray[j + 1]] = [tempArray[j + 1], tempArray[j]];
                        yield [...tempArray];
                    }
                }
            }
        }

        function* selectionGen() {
            let tempArray = [...array];
            for (let i = 0; i < tempArray.length; i++) {
                let min = i;
                for (let j = i + 1; j < tempArray.length; j++) {
                    if (tempArray[j] < tempArray[min]) min = j;
                }
                [tempArray[i], tempArray[min]] = [tempArray[min], tempArray[i]];
                yield [...tempArray];
            }
        }

        function* insertionGen() {
            let tempArray = [...array];
            for (let i = 1; i < tempArray.length; i++) {
                let key = tempArray[i];
                let j = i - 1;
                while (j >= 0 && tempArray[j] > key) {
                    tempArray[j + 1] = tempArray[j];
                    j--;
                    yield [...tempArray];
                }
                tempArray[j + 1] = key;
                yield [...tempArray];
            }
        }

        /* --- STEP CONTROLS --- */

        function stepNext() {
            history.push([...array]); // Save current to history
            const next = it.next();
            if (!next.done) {
                array = next.value;
                render();
            } else {
                alert("Sorting finished!");
                isAutoPlaying = false;
            }
        }

        function stepPrev() {
            if (history.length > 0) {
                array = history.pop();
                render();
            }
        }

        function togglePause() {
            isAutoPlaying = !isAutoPlaying;
            if (isAutoPlaying) loop();
        }

        async function loop() {
            while (isAutoPlaying) {
                stepNext();
                const speed = 101 - document.getElementById('speed').value;
                await new Promise(r => setTimeout(r, speed * 5));
            }
        }

        function autoPlay() {
            isAutoPlaying = true;
            loop();
        }
    </script>
</body>
</html>
