<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoVista Master | Ultimate Step-Visualizer</title>
    <style>
        :root {
            --bg: #030712;
            --sidebar: #111827;
            --primary: #22d3ee;
            --accent: #8b5cf6;
            --text: #f3f4f6;
            --glass: rgba(255, 255, 255, 0.05);
            /* Action Colors */
            --default: linear-gradient(180deg, #22d3ee 0%, #8b5cf6 100%);
            --compare: #facc15; /* Yellow */
            --swap: #ef4444;    /* Red */
            --sorted: #22c55e;  /* Green */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* Start Page */
        #start-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
            z-index: 1000; transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .hero h1 { font-size: 5rem; font-weight: 900; letter-spacing: -2px; }
        .hero h1 span { color: var(--primary); text-shadow: 0 0 30px rgba(34, 211, 238, 0.3); }
        .slide-up { transform: translateY(-100%); }

        /* Layout */
        #app-container { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .sidebar { background: var(--sidebar); padding: 30px; border-right: 1px solid #1f2937; overflow-y: auto; }
        
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.7rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        select, input, textarea { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 8px; font-size: 0.9rem; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-run { background: var(--primary); color: #000; }
        .btn-gen { background: #374151; color: white; }

        /* Color Legend */
        .legend { background: var(--glass); padding: 15px; border-radius: 10px; border: 1px solid #374151; margin-top: 20px; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.75rem; color: #9ca3af; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }

        /* Stage */
        .main-stage { padding: 40px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow-y: auto; }
        .visualizer-container { width: 100%; background: var(--glass); padding: 30px; border-radius: 16px; border: 1px solid #1f2937; margin-bottom: 30px; }
        #array-box { display: flex; align-items: flex-end; gap: 6px; height: 300px; width: 100%; justify-content: center; }
        
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 45px; }
        .bar { width: 100%; background: var(--default); border-radius: 4px 4px 0 0; transition: height 0.3s ease; }

        /* Step Controls */
        .step-controls { display: flex; gap: 10px; margin-top: 30px; justify-content: center; }
        .btn-step { padding: 12px 20px; background: #1e293b; color: white; border: 1px solid var(--primary); border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-step:hover { background: var(--primary); color: #000; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .card { background: var(--sidebar); padding: 20px; border-radius: 12px; border: 1px solid #1f2937; }
        .card h4 { color: var(--primary); margin-bottom: 15px; text-transform: uppercase; font-size: 0.8rem; }
        #code-display { font-family: 'Fira Code', monospace; font-size: 0.8rem; color: #94a3b8; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="start-page">
        <div class="hero">
            <h1>Algo<span>Vista</span></h1>
            <p>The Master Step-by-Step Algorithm Suite</p>
            <center><button class="btn btn-run" style="width: auto; padding: 18px 60px;" onclick="launch()">Initialize Engine</button></center>
        </div>
    </div>

    <div id="app-container">
        <aside class="sidebar">
            <h2>AlgoVista</h2>
            <div class="legend">
                <label>Visual Key</label>
                <div class="legend-item"><div class="dot" style="background: var(--primary)"></div> Idle / Unsorted</div>
                <div class="legend-item"><div class="dot" style="background: var(--compare)"></div> Comparison (Pointer)</div>
                <div class="legend-item"><div class="dot" style="background: var(--swap)"></div> Swap / Active Overwrite</div>
                <div class="legend-item"><div class="dot" style="background: var(--sorted)"></div> Confirmed Sorted</div>
            </div>
            <br>
            <div class="control-group">
                <label>Input Array</label>
                <textarea id="custom-input" placeholder="e.g. 50, 20, 90, 10"></textarea>
                <button class="btn btn-gen" onclick="applyCustom()">Apply Array</button>
            </div>

            <div class="control-group">
                <label>Algorithm</label>
                <select id="algo-select" onchange="resetEngine()">
                    <option value="bubble">Bubble Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="quick">Quick Sort</option>
                    <option value="merge">Merge Sort</option>
                </select>
            </div>

            <div class="control-group">
                <label>Auto-Play Speed</label>
                <input type="range" id="speed" min="1" max="100" value="80">
            </div>

            <button class="btn btn-run" onclick="autoPlay()">Run Full Sequence</button>
            <button class="btn btn-gen" onclick="resetEverything()">Randomize & Reset</button>
        </aside>

        <main class="main-stage">
            <div class="visualizer-container">
                <div id="array-box"></div>
                <div class="step-controls">
                    <button class="btn-step" onclick="stepPrev()">← Previous</button>
                    <button class="btn-step" id="pause-btn" onclick="togglePause()">Play / Pause</button>
                    <button class="btn-step" onclick="stepNext()">Next Step →</button>
                </div>
            </div>

            <div class="info-grid">
                <div class="card">
                    <h4>Complexity Reference</h4>
                    <table id="complexity-table">
                        <tr><td>Worst Case</td><td class="val" id="t-worst">-</td></tr>
                        <tr><td>Average Case</td><td class="val" id="t-avg">-</td></tr>
                        <tr><td>Space</td><td class="val" id="s-space">-</td></tr>
                    </table>
                </div>
                <div class="card">
                    <h4>Logic Snapshot</h4>
                    <div id="code-display"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let array = [];
        let states = []; // History for undo
        let it; // Generator
        let isAutoPlaying = false;

        const dataStore = {
            bubble: { worst: "O(n²)", avg: "O(n²)", space: "O(1)", code: "if (a[j] > a[j+1]) {\n  swap(a[j], a[j+1]);\n}" },
            selection: { worst: "O(n²)", avg: "O(n²)", space: "O(1)", code: "min = i;\nif (a[j] < a[min]) min = j;\nswap(a[i], a[min]);" },
            insertion: { worst: "O(n²)", avg: "O(n²)", space: "O(1)", code: "while (j >= 0 && a[j] > key) {\n  a[j+1] = a[j];\n}" },
            quick: { worst: "O(n²)", avg: "O(n log n)", space: "O(log n)", code: "pivot = a[high];\nif (a[j] < pivot) swap(i, j);" },
            merge: { worst: "O(n log n)", avg: "O(n log n)", space: "O(n)", code: "merge(left, mid, right);" }
        };

        function launch() {
            document.getElementById('start-page').classList.add('slide-up');
            resetEverything();
        }

        function render(currentArray, highlights = {}) {
            const box = document.getElementById('array-box');
            box.innerHTML = '';
            currentArray.forEach((item, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${item.val * 2.5}px`;
                
                // Color Logic
                if (highlights.compare?.includes(i)) bar.style.background = 'var(--compare)';
                else if (highlights.swap?.includes(i)) bar.style.background = 'var(--swap)';
                else if (item.sorted) bar.style.background = 'var(--sorted)';
                else bar.style.background = 'var(--default)';

                wrapper.appendChild(bar);
                box.appendChild(wrapper);
            });
        }

        function resetEverything() {
            const raw = Array.from({length: 12}, () => Math.floor(Math.random() * 80) + 15);
            array = raw.map(v => ({val: v, sorted: false}));
            resetEngine();
        }

        function applyCustom() {
            const str = document.getElementById('custom-input').value;
            if(!str) return;
            const raw = str.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
            array = raw.map(v => ({val: v, sorted: false}));
            resetEngine();
        }

        function resetEngine() {
            const type = document.getElementById('algo-select').value;
            const info = dataStore[type];
            document.getElementById('t-worst').innerText = info.worst;
            document.getElementById('t-avg').innerText = info.avg;
            document.getElementById('s-space').innerText = info.space;
            document.getElementById('code-display').innerText = info.code;

            if(type === 'bubble') it = bubbleGen();
            if(type === 'selection') it = selectionGen();
            if(type === 'insertion') it = insertionGen();
            if(type === 'quick') it = quickGen();
            if(type === 'merge') it = mergeGen();
            
            states = [];
            isAutoPlaying = false;
            render(array);
        }

        /* --- GENERATOR ENGINES --- */

        function* bubbleGen() {
            let a = JSON.parse(JSON.stringify(array));
            for (let i = 0; i < a.length; i++) {
                for (let j = 0; j < a.length - i - 1; j++) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [j, j+1]} };
                    if (a[j].val > a[j + 1].val) {
                        [a[j], a[j + 1]] = [a[j + 1], a[j]];
                        yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [j, j+1]} };
                    }
                }
                a[a.length - i - 1].sorted = true;
            }
            yield { arr: a, hl: {} };
        }

        function* selectionGen() {
            let a = JSON.parse(JSON.stringify(array));
            for (let i = 0; i < a.length; i++) {
                let min = i;
                for (let j = i + 1; j < a.length; j++) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [j, min]} };
                    if (a[j].val < a[min].val) min = j;
                }
                [a[i], a[min]] = [a[min], a[i]];
                yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [i, min]} };
                a[i].sorted = true;
            }
            yield { arr: a, hl: {} };
        }

        function* insertionGen() {
            let a = JSON.parse(JSON.stringify(array));
            a[0].sorted = true;
            for (let i = 1; i < a.length; i++) {
                let key = JSON.parse(JSON.stringify(a[i]));
                let j = i - 1;
                yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [i]} };
                while (j >= 0 && a[j].val > key.val) {
                    a[j + 1] = JSON.parse(JSON.stringify(a[j]));
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [j, j+1]} };
                    j--;
                }
                a[j + 1] = key;
                a.slice(0, i+1).forEach(el => el.sorted = true);
                yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [j+1]} };
            }
            yield { arr: a, hl: {} };
        }

        function* quickGen() {
            let a = JSON.parse(JSON.stringify(array));
            function* recursiveQuick(low, high) {
                if (low <= high) {
                    let pivotIndex = yield* partition(low, high);
                    a[pivotIndex].sorted = true;
                    yield* recursiveQuick(low, pivotIndex - 1);
                    yield* recursiveQuick(pivotIndex + 1, high);
                }
            }
            function* partition(low, high) {
                let pivot = a[high].val;
                let i = low - 1;
                for (let j = low; j < high; j++) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [j, high]} };
                    if (a[j].val < pivot) {
                        i++;
                        [a[i], a[j]] = [a[j], a[i]];
                        yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [i, j]} };
                    }
                }
                [a[i+1], a[high]] = [a[high], a[i+1]];
                yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [i+1, high]} };
                return i + 1;
            }
            yield* recursiveQuick(0, a.length - 1);
            a.forEach(el => el.sorted = true);
            yield { arr: a, hl: {} };
        }

        function* mergeGen() {
            let a = JSON.parse(JSON.stringify(array));
            function* sort(l, r) {
                if (l < r) {
                    let m = Math.floor((l + r) / 2);
                    yield* sort(l, m);
                    yield* sort(m + 1, r);
                    yield* merge(l, m, r);
                }
            }
            function* merge(l, m, r) {
                let n1 = m - l + 1;
                let n2 = r - m;
                let L = a.slice(l, m + 1);
                let R = a.slice(m + 1, r + 1);
                let i = 0, j = 0, k = l;
                while (i < n1 && j < n2) {
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {compare: [l+i, m+1+j]} };
                    if (L[i].val <= R[j].val) a[k++] = L[i++];
                    else a[k++] = R[j++];
                    yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [k-1]} };
                }
                while (i < n1) { a[k++] = L[i++]; yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [k-1]} }; }
                while (j < n2) { a[k++] = R[j++]; yield { arr: JSON.parse(JSON.stringify(a)), hl: {swap: [k-1]} }; }
                if(l === 0 && r === a.length-1) a.forEach(el => el.sorted = true);
            }
            yield* sort(0, a.length - 1);
            a.forEach(el => el.sorted = true);
            yield { arr: a, hl: {} };
        }

        /* --- UI CONTROLS --- */

        function stepNext() {
            const result = it.next();
            if (!result.done) {
                states.push(JSON.parse(JSON.stringify({arr: array, hl: {}}))); // Minimal state for undo
                array = result.value.arr;
                render(array, result.value.hl);
            } else {
                isAutoPlaying = false;
            }
        }

        function stepPrev() {
            if (states.length > 0) {
                const prev = states.pop();
                array = prev.arr;
                render(array);
            }
        }

        function togglePause() {
            isAutoPlaying = !isAutoPlaying;
            if (isAutoPlaying) loop();
        }

        async function loop() {
            while (isAutoPlaying) {
                stepNext();
                const speed = 101 - document.getElementById('speed').value;
                await new Promise(r => setTimeout(r, speed * 4));
            }
        }

        function autoPlay() {
            isAutoPlaying = true;
            loop();
        }
    </script>
</body>
</html>
